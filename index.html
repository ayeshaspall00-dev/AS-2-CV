<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Exact CV</title>

<style>
body {
    margin: 0;
    background: #e5e5e5;
}

/* A4 container */
.page {
    width: 210mm;
    height: 297mm;
    margin: 20px auto;
    position: relative;
    background: url('cv-bg.png') no-repeat center;
    background-size: 100% 100%;
}

/* Optional invisible text layer (for selection/search) */
.overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    color: transparent; /* invisible but selectable */
    font-family: Arial;
}
</style>

</head>

<body>

<div class="page">
    <div class="overlay">
        Ayesha Noor
        AI Undergraduate
        AI student passionate about machine learning...
    </div>
</div>

</body>
</html>
